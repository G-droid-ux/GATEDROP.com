<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>GateDrop - Anecdotes d'aéroport</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#0B2545;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

button{
cursor:pointer;
border:none;
border-radius:6px;
padding:8px 12px;
}

.publish-btn{
background:#FFC300;
font-weight:bold;
}

.form{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
display:none;
}

textarea{
width:100%;
height:90px;

border:1px solid #ccc;
}

input[type="file"]{
margin-top:10px;
}

.post{
background:white;
border-radius:8px;
padding:15px;
margin-bottom:20px;
display:flex;
gap:10px;
}

.vote{
width:60px;
text-align:center;
font-size:18px;
}

.vote button{
background:none;
font-size:18px;
}

.content{
flex:1;
}

.post img{
max-width:100%;
border-radius:6px;
margin-top:10px;
}

.meta{
font-size:12px;
color:gray;
}

.comments{
margin-top:10px;
border-top:1px solid #eee;
padding-top:10px;
}

.comment{
font-size:14px;
margin-bottom:6px;
}

.comment-input{
width:100%;
padding:6px;
margin-top:5px;
}

</style>

</head>

<body>

<header>

<h1>✈️ GateDrop</h1>

<button class="publish-btn" onclick="toggleForm()">Publier une anecdote</button>

</header>

<div class="container">

<div id="form" class="form">

<textarea id="story" placeholder="Raconte ton anecdote d'aéroport..."></textarea>

<input type="file" id="imageInput">

<br><br>

<button onclick="publish()">Publier</button>

</div>

<div id="posts"></div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("gatedrop")) || [

{
text:"Aujourd'hui à l'aéroport de Paris, un passager a essayé de passer la sécurité avec une machine à raclette dans son bagage cabine.",
votes:12,
image:"",
comments:["😂 incroyable","ça ne m'étonne même pas"]
},

{
text:"Un passager a demandé si le pilote pouvait faire un détour pour voir la Tour Eiffel depuis l'avion.",
votes:7,
image:"",
comments:["incroyable","les gens sont fous"]
}

]

function save(){
localStorage.setItem("gatedrop",JSON.stringify(posts))
}

function toggleForm(){
let f=document.getElementById("form")
f.style.display=f.style.display==="none"?"block":"none"
}

function publish(){

let text=document.getElementById("story").value
let file=document.getElementById("imageInput").files[0]

if(text==="") return

if(file){

let reader=new FileReader()

reader.onload=function(e){

posts.unshift({
text:text,
votes:0,
image:e.target.result,
comments:[]
})

save()
render()

}

reader.readAsDataURL(file)

}else{

posts.unshift({
text:text,
votes:0,
image:"",
comments:[]
})

save()
render()

}

document.getElementById("story").value=""
document.getElementById("imageInput").value=""

}

function vote(i,v){

posts[i].votes+=v
save()
render()

}

function comment(i){

let input=document.getElementById("comment"+i)
let txt=input.value

if(txt==="") return

posts[i].comments.push(txt)

input.value=""

save()
render()

}

function render(){

let html=""

posts.forEach((p,i)=>{

html+=`

<div class="post">

<div class="vote">

<button onclick="vote(${i},1)">▲</button>

<div>${p.votes}</div>

<button onclick="vote(${i},-1)">▼</button>

</div>

<div class="content">

<p>${p.text}</p>

${p.image ? `<img src="${p.image}">` : ""}

<div class="meta">Posté anonymement</div>

<div class="comments">

${p.comments.map(c=>`<div class="comment">💬 ${c}</div>`).join("")}

<input id="comment${i}" class="comment-input" placeholder="Commenter...">

<button onclick="comment(${i})">Envoyer</button>

</div>

</div>

</div>

`

})

document.getElementById("posts").innerHTML=html

}

render()

</script>

</body>

</html>
